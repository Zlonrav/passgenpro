<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <title>Генератор паролей и пин-кодов</title>
    <style>
        /* 1. БАЗОВЫЕ ПЕРЕМЕННЫЕ (СВЕТЛАЯ ТЕМА) */
        :root { 
            --bg: #f1f5f9; --glass: #ffffff; --glass-border: #cbd5e1; 
            --text-main: #0f172a; --text-dim: #475569; --accent: #4338ca; 
            --pass-blue: #38bdf8; --card-shadow: rgba(0,0,0,0.1); --panic-red: #ef4444;
            --input-bg: #ffffff; --icon-bg: #f8fafc;
        }

        /* 2. ТЕМНАЯ ТЕМА (ПАРОЛЬ) */
        [data-theme="dark"] {
            --bg: #0f172a; --glass: #1e293b; --glass-border: #334155;
            --text-main: #f1f5f9; --text-dim: #94a3b8; --accent: #818cf8;
            --card-shadow: rgba(0,0,0,0.4); --input-bg: #0f172a; --icon-bg: #0f172a;
        }

        /* 3. ПИН-РЕЖИМ (СВЕТЛЫЙ) */
        body.pin-mode-active { 
            --bg: #e2e8f0; --glass: #f0f9ff; --glass-border: #bae6fd; --accent: #0284c7; 
        }

        /* 4. ПИН-РЕЖИМ (ТЕМНЫЙ) */
        [data-theme="dark"].pin-mode-active,
        [data-theme="dark"] .pin-mode-active { 
            --bg: #0b1120; 
            --glass: #1e293b; 
            --glass-border: #0ea5e9; 
            --accent: #0ea5e9; 
        }

        body {
            font-family: -apple-system, system-ui, sans-serif; background: var(--bg);
            min-height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center;
            padding: 12px; box-sizing: border-box; transition: background 0.3s, color 0.3s;
        }
        .glass-card { 
            background: var(--glass); border: 2px solid var(--glass-border); border-radius: 28px; 
            padding: 40px 28px 20px 28px; width: 100%; max-width: 355px; position: relative;
            box-shadow: 0 18px 38px -10px var(--card-shadow); transition: all 0.3s; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* КНОПКИ УПРАВЛЕНИЯ - ЕДИНЫЙ СТИЛЬ И ПОЗИЦИЯ */
        .info-toggle, .close-memo, .theme-toggle { 
            position: absolute; top: 18px; width: 32px; height: 32px; 
            background: var(--glass); border: 2px solid var(--glass-border); border-radius: 50%; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            font-weight: 800; font-size: 14px; color: var(--text-main); outline: none; z-index: 10;
            transition: 0.2s;
        }
        .info-toggle, .close-memo { right: 18px; } /* ИДЕНТИЧНАЯ ПОЗИЦИЯ */
        .theme-toggle { left: 18px; font-size: 16px; }
        .close-memo { z-index: 110; } /* Выше слоя оверлея */

        .memo-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--glass); z-index: 100; padding: 40px 28px; 
            box-sizing: border-box; display: none; flex-direction: column;
        }
        h2, h3 { font-size: 21px; text-align: center; margin: 0 0 22px 0; letter-spacing: -0.5px; color: var(--text-main); }
        .input-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 5px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text-dim); cursor: pointer; }
        input, select { 
            width: 100%; padding: 12px 15px; background: var(--input-bg); border: 2px solid var(--glass-border); 
            border-radius: 13px; font-size: 16px; color: var(--text-main); box-sizing: border-box; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--accent); }
        .secure-mask { -webkit-text-security: disc !important; text-security: disc !important; }
        
        .controls-row { display: flex; align-items: center; justify-content: space-between; margin: 12px 0 18px 0; }
        .toggle-container { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 10px; font-weight: 700; color: var(--text-dim); }

        .switch { position: relative; display: inline-block; width: 34px; height: 18px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #cbd5e1; transition: .3s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(16px); }
        
        .row-inputs { display: flex; gap: 10px; margin-bottom: 16px; }
        .row-inputs > div { flex: 1; }
        
        .btn-gen { 
            width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 14px; 
            font-weight: 800; font-size: 15px; cursor: pointer; transition: 0.3s; margin-bottom: 12px;
        }
        .btn-reset { 
            width: 100%;
            height: 44px;              /* Четкая высота */
            display: flex;             /* Центрируем через flex для надежности */
            align-items: center;
            justify-content: center;
            
            background: transparent; 
            border: 1px solid var(--panic-red); 
            border-radius: 14px;
            
            color: var(--panic-red); 
            font-size: 11px; 
            font-weight: 800; 
            text-transform: uppercase; 
            
            cursor: pointer; 
            margin: 15px 0;            /* Увеличили внешний отступ, чтобы поля не «наползали» */
            padding: 0;
            
            /* КРИТИЧНО ДЛЯ МОБИЛЬНЫХ */
            touch-action: manipulation; /* Убирает задержку клика и лишние фантомные зоны */
            -webkit-appearance: none;   /* Убирает системные стили кнопок iOS */
            position: relative;         /* Изолирует слой кнопки */
            z-index: 5;
        }


       
        .result-box { background: #0f172a; padding: 18px; border-radius: 22px; margin-top: 15px; text-align: center; }
        #display { width: 100%; border: none; background: transparent; text-align: center; font-family: monospace; font-size: 21px; font-weight: 700; color: var(--pass-blue); outline: none; margin-bottom: 8px; cursor: pointer; }
        .btn-copy { width: 100%; padding: 11px; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.1); border-radius: 11px; cursor: pointer; font-weight: 700; font-size: 12px; transition: 0.3s; }
        .btn-copy.copied { background: var(--pass-blue); color: #0f172a; }

        .visual-footer {
            margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--glass-border);
            display: flex; justify-content: center; align-items: center; gap: 12px;
        }
        .icon-unit {
            width: 32px; height: 32px; background: var(--icon-bg); border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 18px;
            border: 1px solid var(--glass-border); transition: 0.3s;
        }
        /* Убираем стрелки для Chrome, Safari, Edge, Opera */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        /* Убираем стрелки для Firefox */
        input[type=number] {
            -moz-appearance: textfield;
        }
        /* Подсвечиваем пустые рамки розовым */
        .input-error {
            border-color: #fda4af !important; /* Розовый оттенок */
            box-shadow: 0 0 0 3px rgba(251, 113, 133, 0.2);
            transition: 0.2s;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <button class="theme-toggle" id="themeToggle" title="Сменить тему">🌙</button>
    <button class="info-toggle" id="toggleBtn" aria-label="Информация">i</button>
    
    <div class="memo-overlay" id="memoBox">
        <button id="closeMemo" class="close-memo" aria-label="Закрыть">✕</button>
        <h3>ИНФО</h3>
        <p style="font-size:14px; line-height:1.6; color: var(--text-main);">Любое изменение данных мгновенно сбрасывает результат. Иконки внизу зависят от всех параметров и служат визуальным ключом.</p>
    </div>

    <h2 id="mainTitle">Генератор пароля</h2>
    <div class="input-group">
    <label for="s1">Secret Word 1</label>
    <input type="text" id="s1" class="nav-input" placeholder="Логин или метка" autocomplete="one-time-code" spellcheck="false">
</div>
<div class="input-group">
    <label for="s2">Secret Word 2</label>
    <input type="text" id="s2" class="nav-input" placeholder="Секретное слово" autocomplete="one-time-code" spellcheck="false">
</div>

<div class="row-inputs">
    <div>
        <label for="num">Число (0-999) *</label>
        <!-- Здесь добавили autocomplete="one-time-code" для защиты от подсказок -->
        <input type="number" id="num" class="nav-input" min="0" max="999" inputmode="numeric" placeholder="Обязательно" autocomplete="one-time-code" spellcheck="false">
    </div>
    <div>
        <label for="len">Знаков</label>
        <select id="len" class="nav-input"></select>
    </div>
</div>


    <div class="controls-row">
        <label class="toggle-container" for="toggleHide">
            <div class="switch"><input type="checkbox" id="toggleHide"><span class="slider"></span></div>
            МАСК.
        </label>
        <label class="toggle-container" for="pinMode">
            ПИН.
            <div class="switch"><input type="checkbox" id="pinMode"><span class="slider"></span></div>
        </label>
    </div>

    <button class="btn-gen" id="genBtn">СОЗДАТЬ</button>
    <button class="btn-reset" id="resetBtn">СБРОС</button>

    <div class="result-box">
        <input type="text" id="display" readonly placeholder="--------">
        <button class="btn-copy" id="copyBtn" disabled>КОПИРОВАТЬ</button>
    </div>

    <div class="visual-footer" id="iconBox">
        <div class="icon-unit"></div><div class="icon-unit"></div><div class="icon-unit"></div>
    </div>
</div>
<script>
(function() {
    const s1 = document.getElementById('s1'), 
          s2 = document.getElementById('s2'), 
          num = document.getElementById('num'), 
          disp = document.getElementById('display'), 
          copy = document.getElementById('copyBtn'),
          hide = document.getElementById('toggleHide'), 
          pinMode = document.getElementById('pinMode'),
          genBtn = document.getElementById('genBtn'), 
          resetBtn = document.getElementById('resetBtn'), 
          lenSel = document.getElementById('len'), 
          mainTitle = document.getElementById('mainTitle'),
          iconBox = document.getElementById('iconBox'), 
          themeToggle = document.getElementById('themeToggle');

    const _s = [74, 109, 110, 100, 95, 86, 49, 48].map(c => String.fromCharCode(c)).join('');
    const emojis = ["🍎","🍊","🍋","🍇","🍓","🍒","🥑","🥦","🍄","🦁","🐯","🐶","🐱","🐭","🦊","🐼","🐻","🐨","🐙","🦋","⭐️","🌙","☀️","🔥","🌈","🍦","🍕","💎","🚀","🎸","✈️","⚽️","🧩","🔑","💡","⏰","🧭","🔭","🧿","🍀","🍭","🎨","🎲","📀","🔔","📦","📫","🎈","🎭","🎧"];
    
    let finalPass = "", animInterval, panicTimer, resetTimer, isLongPress = false;

    themeToggle.onclick = () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        themeToggle.innerText = newTheme === 'dark' ? '☀️' : '🌙';
        localStorage.setItem('gen_theme', newTheme);
    };

    const startPanic = () => { 
        clearTimeout(panicTimer); 
        panicTimer = setTimeout(() => resetAll(true), 60000); 
    };

    const clearResult = () => {
        clearInterval(animInterval);
        finalPass = ""; disp.value = ""; disp.placeholder = "--------"; copy.disabled = true;
    };

    const updateIcons = () => {
        const v1 = s1.value.trim().toLowerCase(), v2 = s2.value.trim().toLowerCase(), 
              v3 = num.value.trim(), L = parseInt(lenSel.value) || 0;
        const units = iconBox.querySelectorAll('.icon-unit');
        if (!v1 || !v2 || !v3) { units.forEach(u => { u.innerText = ""; u.style.opacity = "0.5"; }); return; }
        
        const n = parseInt(v3) || 0;
        let h = 0x811c9dc5;
        const seed = v1 + _s + v2 + (n * 179) + (L * 31);
        for (let i = 0; i < seed.length; i++) { h ^= seed.charCodeAt(i); h = Math.imul(h, 16777619); }
        const combo = [emojis[Math.abs(h)%50], emojis[Math.abs(Math.imul(h,31))%50], emojis[Math.abs(Math.imul(h,73))%50]];
        units.forEach((u, i) => { u.innerText = combo[i]; u.style.opacity = "1"; });
    };

    const applyMask = () => {
        const isHide = hide.checked;
        [s1, s2, num, disp].forEach(el => isHide ? el.classList.add('secure-mask') : el.classList.remove('secure-mask'));
        localStorage.setItem('gen_hideMode', isHide);
    };

    const updateUI = (fullReset = false) => {
        const isPin = pinMode.checked;
        if (fullReset) clearResult();
        
        document.body.classList.toggle('pin-mode-active', isPin);
        mainTitle.innerText = isPin ? "Генератор ПИН-кода" : "Генератор пароля";
        
        if (isPin) {
            lenSel.innerHTML = '<option value="4" selected>4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option>';
        } else {
            lenSel.innerHTML = '<option value="8">8</option><option value="12" selected>12</option><option value="16">16</option><option value="20">20</option><option value="24">24</option>';
        }

        updateIcons(); 
        applyMask();
        localStorage.setItem('gen_pinMode', isPin);
    };

    const resetAll = (isPanic = false) => {
        if (document.activeElement) document.activeElement.blur();
        [s1, s2, num].forEach(el => { el.value = ""; el.classList.remove('input-error'); });
        pinMode.checked = localStorage.getItem('gen_pinMode') === 'true';
        hide.checked = localStorage.getItem('gen_hideMode') === 'true';
        const savedTheme = localStorage.getItem('gen_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeToggle.innerText = savedTheme === 'dark' ? '☀️' : '🌙';
        
        updateUI(true);
        if(isPanic) { 
            disp.placeholder = "ПАНИКА: ОЧИЩЕНО!"; 
            setTimeout(() => { if(!finalPass) disp.placeholder = "--------"; }, 2000); 
        }
        s1.focus();
    };

    const validateAndGenerate = () => {
        let hasError = false;
        [s1, s2, num].forEach(f => {
            if (!f.value.trim()) {
                f.classList.add('input-error');
                hasError = true;
            } else {
                f.classList.remove('input-error');
            }
        });
        if (hasError) return;
        generate();
    };

    const generate = () => {
        const v1 = s1.value.trim().toLowerCase(), v2 = s2.value.trim().toLowerCase(), v3 = num.value.trim();
        const n = parseInt(v3) || 0;
        const L = parseInt(lenSel.value);
        
        let h = 0x811c9dc5;
        const seed = v1 + _s + v2 + (n * 179) + (L * 31);
        for (let i = 0; i < seed.length; i++) { h ^= seed.charCodeAt(i); h = Math.imul(h, 16777619); }
        
        let res = [], tH = h;
        
        if (pinMode.checked) {
            for (let i = 0; i < L; i++) { 
                tH = Math.imul(tH ^ (tH >>> 16), 0x85ebca6b); 
                res.push("0123456789"[Math.abs(tH)%10]); 
            }
            finalPass = res.join('');
        } else {
            const U = "ABCDEFGHIJKLMNOPQRSTUVWXYZ", D = "0123456789", S = "!@#$%^*", M = "abcdefghijklmnopqrstuvwxyz";
            const alphaNum = U + D + M;
            const all = U + D + S + M;

            res = [
                alphaNum[Math.abs(h) % alphaNum.length], 
                D[Math.abs(Math.imul(h, 31)) % 10], 
                S[Math.abs(Math.imul(h, 73)) % 7]
            ];
            
            for (let i = 3; i < L; i++) { 
                tH = Math.imul(tH ^ (tH >>> 16), 0x85ebca6b); 
                res.push(all[Math.abs(tH) % all.length]); 
            }
            
            let s = h; 
            for (let i = res.length - 1; i > 1; i--) { 
                s = Math.imul(s ^ (s >>> 16), 0x85ebca6b); 
                const j = 1 + (Math.abs(s) % i); 
                [res[i], res[j]] = [res[j], res[i]]; 
            }
            finalPass = res.join('');
        }

        clearInterval(animInterval);
        let it = 0; 
        const chars = pinMode.checked ? "0123456789" : "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^*";
        animInterval = setInterval(() => {
            disp.value = finalPass.split("").map((c, i) => i < it ? finalPass[i] : chars[Math.floor(Math.random()*chars.length)]).join("");
            if (it >= finalPass.length) clearInterval(animInterval);
            it += 1/3;
        }, 30);
        copy.disabled = false;
    };

    const inputs = [s1, s2, num];
    inputs.forEach((el, idx) => {
        el.setAttribute('autocomplete', 'one-time-code');
        el.setAttribute('spellcheck', 'false');

        el.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.keyCode === 13) {
                if (!el.value.trim()) {
                    e.preventDefault();
                    el.classList.add('input-error');
                    el.focus();
                } else if (el.id === 'num') {
                    e.preventDefault();
                    el.blur();
                    validateAndGenerate();
                } else {
                    e.preventDefault();
                    inputs[idx + 1].focus();
                }
            }
        });

        el.addEventListener('blur', () => {
            if (!el.value.trim()) el.classList.add('input-error');
            else {
                el.classList.remove('input-error');
                if (el.id === 'num' && s1.value.trim() && s2.value.trim()) validateAndGenerate();
            }
        });

        el.addEventListener('input', () => {
            el.classList.remove('input-error');
            if (el.id === 'num') el.value = el.value.replace(/[^0-9]/g, '').slice(0, 3);
            updateIcons();
            clearResult();
        });
    });

    pinMode.onchange = () => updateUI(true);
    lenSel.onchange = () => { clearResult(); updateIcons(); };
    hide.onchange = applyMask;
    genBtn.onclick = validateAndGenerate;

    // УЛУЧШЕННАЯ ЛОГИКА КНОПКИ СБРОС
    const startResetTimer = (e) => {
        if (e.cancelable) e.preventDefault(); 
        isLongPress = false;
        resetTimer = setTimeout(() => {
            isLongPress = true;
            localStorage.clear();
            location.reload();
        }, 2000);
    };

    const stopResetTimer = (e) => {
        clearTimeout(resetTimer);
        // Если это был короткий клик/тап (не лонгпресс) - сбрасываем форму
        if (!isLongPress && (e.type === 'mouseup' || e.type === 'touchend')) {
            resetAll(false);
        }
    };

    // Привязка событий для точного попадания
    resetBtn.addEventListener('mousedown', startResetTimer);
    resetBtn.addEventListener('mouseup', stopResetTimer);
    resetBtn.addEventListener('mouseleave', () => clearTimeout(resetTimer));

    resetBtn.addEventListener('touchstart', startResetTimer, {passive: false});
    resetBtn.addEventListener('touchend', stopResetTimer, {passive: false});
    
    copy.onclick = () => {
        const t = document.createElement('textarea'); t.value = finalPass; document.body.appendChild(t);
        t.select(); document.execCommand('copy'); document.body.removeChild(t);
        const old = copy.innerText; copy.innerText = "ГОТОВО"; copy.classList.add('copied');
        setTimeout(() => { copy.innerText = old; copy.classList.remove('copied'); }, 1500);
    };

    const showP = (e) => { if(e.cancelable) e.preventDefault(); disp.classList.remove('secure-mask'); };
    const hideP = () => { if(hide.checked && finalPass) disp.classList.add('secure-mask'); };
    disp.addEventListener('mousedown', showP); disp.addEventListener('mouseup', hideP); disp.addEventListener('mouseleave', hideP);
    disp.addEventListener('touchstart', showP, {passive: false}); disp.addEventListener('touchend', hideP);

    document.getElementById('toggleBtn').onclick = () => document.getElementById('memoBox').style.display = 'flex';
    document.getElementById('closeMemo').onclick = () => document.getElementById('memoBox').style.display = 'none';
    ['mousedown', 'keydown', 'touchstart'].forEach(ev => document.addEventListener(ev, startPanic));
    
    window.onload = () => resetAll(false);
})();
</script>
</body>
</html>
