<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <title>Генератор паролей и PIN-кодов</title>
<style>
    /* =========================================================================
       1. ПЕРЕМЕННЫЕ И ТЕМЫ (VARIABLES & THEMES)
       ========================================================================= */
    :root { 
        --bg: #f1f5f9; --glass: #ffffff; --glass-border: #cbd5e1; 
        --text-main: #0f172a; --text-dim: #475569; --accent: #4338ca; 
        --pass-blue: #38bdf8; --card-shadow: rgba(0,0,0,0.1); --panic-red: #ef4444;
        --input-bg: #ffffff; --icon-bg: #f8fafc;
        --grid-bg: rgba(67, 56, 202, 0.025); /* Чуть ярче для теста */
    }

    [data-theme="dark"] {
        --bg: #0f172a; --glass: #1e293b; --glass-border: #334155;
        --text-main: #f1f5f9; --text-dim: #94a3b8; --accent: #818cf8;
        --card-shadow: rgba(0,0,0,0.4); --input-bg: #0f172a; --icon-bg: #0f172a;
        --grid-bg: rgba(129, 140, 248, 0.04); /* Едва заметный */
    }

    body.pin-mode-active { 
        --bg: #e2e8f0; --glass: #f0f9ff; --glass-border: #bae6fd; --accent: #0284c7; 
    }

    [data-theme="dark"].pin-mode-active,
    [data-theme="dark"] .pin-mode-active { 
        --bg: #0b1120; --glass: #1e293b; --glass-border: #0ea5e9; --accent: #0ea5e9; 
    }

    /* =========================================================================
       2. БАЗОВЫЕ СТИЛИ (BASE STYLES)
       ========================================================================= */
    body {
        font-family: -apple-system, system-ui, sans-serif; min-height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; padding: 12px; box-sizing: border-box; transition: background-color 0.3s;
        /* НАСТРОЙКИ СЕТКИ */
        background-color: var(--bg); background-image: linear-gradient(var(--grid-bg) 1px, transparent 1px), linear-gradient(90deg, var(--grid-bg) 1px, transparent 1px); background-size: 40px 40px; background-position: center center;
    }

    .glass-card { 
        background: var(--glass); border: 2px solid var(--glass-border); border-radius: 28px; 
        padding: 40px 28px 20px 28px; width: 100%; max-width: 355px; position: relative;
        box-shadow: 0 18px 38px -10px var(--card-shadow); transition: all 0.3s; overflow: hidden;
        display: flex; flex-direction: column;
    }

    h2 {font-size: 18px; text-align: center; margin: 0 0 22px 0; letter-spacing: -0.5px; color: var(--text-main);}
    h3 {font-size: 21px; text-transform: uppercase; text-align: center; margin: 0 0 22px 0; letter-spacing: -0.5px; color: var(--text-main); }

    /* Надзаголовок над основным названием */
    .brand-overline {text-align: center; text-transform: uppercase; letter-spacing: 0.2px; /* Увеличили разрядку для эффекта "узкой" строки */ font-size: 7.5px;       /* Уменьшили размер */ line-height: 1; margin: 0 auto 2px auto; /* Центрирование */ color: var(--text-dim); font-weight: 400;     /* Убрали жирность (нормальный вес) */ opacity: 0.7;         /* Чуть прибавили видимости из-за тонких линий */ display: block; width: fit-content;   /* Контейнер по размеру текста для точного центра */}
    
    /* =========================================================================
       3. ФОРМЫ И ИНПУТЫ (FORMS & INPUTS)
       ========================================================================= */
    .input-group { margin-bottom: 16px; }
    .row-inputs { display: flex; gap: 10px; margin-bottom: 16px; }
    .row-inputs > div { flex: 1; }

    label { display: block; margin-bottom: 5px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text-dim); cursor: pointer; }
    
    input, select { 
        width: 100%; padding: 12px 15px; background: var(--input-bg); border: 2px solid var(--glass-border); 
        border-radius: 13px; font-size: 16px; color: var(--text-main); box-sizing: border-box; outline: none; transition: 0.2s;
    }

    input:focus { border-color: var(--accent); }
    .secure-mask { -webkit-text-security: disc !important; text-security: disc !important; }

    /* Валидация и браузерные фиксы */
    .input-error { border-color: #fda4af !important; box-shadow: 0 0 0 3px rgba(251, 113, 133, 0.2); transition: 0.2s; }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    /* =========================================================================
       4. УПРАВЛЕНИЕ И ПЕРЕКЛЮЧАТЕЛИ (CONTROLS)
       ========================================================================= */
    /* Текст инфо */
    .controls-row { display: flex; align-items: center; justify-content: space-between; margin: 12px 0 18px 0; }
    .toggle-container { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 10px; font-weight: 700; color: var(--text-dim); }

    /* Слайдеры */
    .switch { position: relative; display: inline-block; width: 34px; height: 18px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #cbd5e1; transition: .3s; border-radius: 20px; }
    .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background: white; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background: var(--accent); }
    input:checked + .slider:before { transform: translateX(16px); }

    /* =========================================================================
       5. КНОПКИ (BUTTONS)
       ========================================================================= */
    .btn-gen, .btn-reset {
        transition: all 0.1s ease-out;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
    }
    /* Кнопка ПОМОЩЬ */
    .theme-toggle, .info-toggle { 
        position: absolute; top: 18px; width: 32px; height: 32px; 
        background: var(--glass); border: 2px solid var(--glass-border); border-radius: 50%; 
        cursor: pointer; display: flex; align-items: center; justify-content: center; 
        font-weight: 800; font-size: 16px; color: var(--text-main); outline: none; z-index: 10; transition: 0.2s;
        }
    .theme-toggle { left: 18px; }
    .info-toggle { right: 18px; }

    /* Кнопка ГЕНЕРИРОВАТЬ */
    .btn-gen { 
        width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 14px; 
        font-weight: 800; font-size: 15px; cursor: pointer; margin-bottom: 12px;
    }
    .btn-gen.is-active { transform: scale(0.95) !important; filter: brightness(0.9); }

    /* Кнопка СБРОС */
    .btn-reset { 
        width: 100%; height: 44px; display: flex; align-items: center; justify-content: center;
        background: transparent; border: 2px solid var(--glass-border); border-radius: 14px;
        color: var(--text-dim); font-size: 11px; font-weight: 800; text-transform: uppercase; 
        letter-spacing: 1.2px; cursor: pointer; margin: 16px 0; padding: 0;
        position: relative; overflow: hidden; z-index: 1;
        touch-action: manipulation; -webkit-appearance: none; box-sizing: border-box;
    }
    .btn-reset::before {
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background-color: var(--panic-red); opacity: 0; z-index: -1; transition: opacity 0.4s ease;
    }

    /* =========================================================================
       6. РЕЗУЛЬТАТ И ФУТЕР (RESULT & FOOTER)
       ========================================================================= */
    .result-box { background: #0f172a; padding: 18px; border-radius: 22px; margin-top: 15px; text-align: center; }
    
    #display { 
        width: 100%; border: none; background: transparent; text-align: center; font-family: monospace; 
        font-size: 21px; font-weight: 700; color: var(--pass-blue); outline: none; margin-bottom: 8px; cursor: pointer; 
    }

    .btn-copy { 
        width: 100%; padding: 11px; background: rgba(255,255,255,0.1); color: #fff; 
        border: 1px solid rgba(255,255,255,0.1); border-radius: 11px; cursor: pointer; 
        font-weight: 700; font-size: 12px; transition: 0.3s; 
    }
    .btn-copy.copied { background: var(--pass-blue); color: #0f172a; }

    .visual-footer {
        margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--glass-border);
        display: flex; justify-content: center; align-items: center; gap: 12px;
    }
    .icon-unit {
        width: 32px; height: 32px; background: var(--icon-bg); border-radius: 10px;
        display: flex; align-items: center; justify-content: center; font-size: 18px;
        border: 1px solid var(--glass-border); transition: 0.3s;
    }

    /* =========================================================================
       7. АНИМАЦИИ (ANIMATIONS)
       ========================================================================= */
    @keyframes fillRed { 0% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes whiteText { 
        0% { color: var(--text-dim); border-color: var(--glass-border); } 
        100% { color: #ffffff; border-color: var(--panic-red); } 
    }
    
     /* Псхлк */
    #matrix-canvas {position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; /* Фон */ display: none; /* Скрыт по умолчанию */}
    
    /* Состояния СБРОС при активации JS */
    .btn-reset.is-active::before { animation: fillRed 1s linear forwards; }
    .btn-reset.is-active { animation: whiteText 2s linear forwards; transform: scale(0.97); }
</style>

</head>
<body>   
<div class="glass-card">
    <!-- 1. КНОПКИ УПРАВЛЕНИЯ (ВЕРХНИЙ СЛОЙ) -->
    <button class="theme-toggle" id="themeToggle" title="Сменить тему">🌙</button>
    <button class="info-toggle" id="helpBtn" aria-label="Помощь">?</button>

    <!-- 2. ЗАГОЛОВОК И ОСНОВНЫЕ ПОЛЯ ВВОДА -->
    <span class="brand-overline">Первый российский детерминированный</span>
    <h2 id="mainTitle">Генератор паролей</h2>
    
    <div class="input-group">
        <label for="s1">Секретное слово 1</label>
        <input type="text" id="s1" class="nav-input" placeholder="Логин или метка" autocomplete="one-time-code" spellcheck="false">
    </div>

    <div class="input-group">
        <label for="s2">Секретное слово 2</label>
        <input type="text" id="s2" class="nav-input" placeholder="Секретное слово" autocomplete="one-time-code" spellcheck="false">
    </div>

    <!-- 3. СТРОКА С ЧИСЛОМ И ВЫБОРОМ ДЛИНЫ -->
    <div class="row-inputs">
        <div>
            <label for="num">Число от 0 до 999</label>
            <input type="number" id="num" class="nav-input" min="0" max="999" inputmode="numeric" placeholder="Обязательно" autocomplete="one-time-code" spellcheck="false">
        </div>
        <div>
            <label for="len">Знаков</label>
            <select id="len" class="nav-input"></select>
        </div>
    </div>

    <!-- 4. ПЕРЕКЛЮЧАТЕЛИ РЕЖИМОВ -->
    <div class="controls-row">
        <label class="toggle-container" for="toggleHide">
            <div class="switch">
                <input type="checkbox" id="toggleHide">
                <span class="slider"></span>
            </div>
            МАСК.
        </label>
        <label class="toggle-container" for="pinMode">
            ПИН.
            <div class="switch">
                <input type="checkbox" id="pinMode">
                <span class="slider"></span>
            </div>
        </label>
    </div>

    <!-- 5. КНОПКИ ДЕЙСТВИЯ -->
    <button class="btn-gen" id="genBtn">СОЗДАТЬ</button>
    <button class="btn-reset" id="resetBtn">СБРОС</button>

    <!-- 6. БЛОК ВЫВОДА РЕЗУЛЬТАТА -->
    <div class="result-box">
        <input type="text" id="display" readonly placeholder="--------">
        <button class="btn-copy" id="copyBtn" disabled>КОПИРОВАТЬ</button>
    </div>

    <!-- 7. ВИЗУАЛЬНЫЙ ФУТЕР (ИКОНКИ-КЛЮЧИ) -->
    <div class="visual-footer" id="iconBox">
        <div class="icon-unit"></div>
        <div class="icon-unit"></div>
        <div class="icon-unit"></div>
    </div>
</div>
<script>
(function() {
    // 1. ЭЛЕМЕНТЫ И СОСТОЯНИЕ
    const s1 = document.getElementById('s1'), 
          s2 = document.getElementById('s2'), 
          num = document.getElementById('num'), 
          disp = document.getElementById('display'), 
          copy = document.getElementById('copyBtn'),
          hide = document.getElementById('toggleHide'), 
          pinMode = document.getElementById('pinMode'),
          genBtn = document.getElementById('genBtn'), 
          resetBtn = document.getElementById('resetBtn'), 
          lenSel = document.getElementById('len'), 
          mainTitle = document.getElementById('mainTitle'),
          iconBox = document.getElementById('iconBox'), 
          themeToggle = document.getElementById('themeToggle');

    const _s = [74, 109, 110, 100, 95, 86, 49, 48].map(c => String.fromCharCode(c)).join('');
    const emojis = ["🍎","🍊","🍋","🍇","🍓","🍒","🥑","🥦","🍄","🦁","🐯","🐶","🐱","🐭","🦊","🐼","🐻","🐨","🐙","🦋","⭐️","🌙","☀️","🔥","🌈","🍦","🍕","💎","🚀","🎸","✈️","⚽️","🧩","🔑","💡","⏰","🧭","🔭","🧿","🍀","🍭","🎨","🎲","📀","🔔","📦","📫","🎈","🎭","🎧"];
    
    let finalPass = "", animInterval, panicTimer, resetTimer, isLongPress = false;

    // --- ФУНКЦИЯ МАТРИЦЫ ДЛЯ ПАСХАЛКИ ---
    const startMatrix = (color) => {
        let canvas = document.getElementById('matrix-canvas');
        if (!canvas) {
            canvas = document.createElement('canvas');
            canvas.id = 'matrix-canvas';
            document.body.appendChild(canvas);
        }
        canvas.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;background:black;";
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ#$@&*", fontSize = 16;
        const cols = canvas.width / fontSize, drops = Array(Math.floor(cols)).fill(1);
        const draw = () => {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = color; ctx.font = fontSize + "px monospace";
            drops.forEach((y, i) => {
                const txt = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(txt, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        };
        const itv = setInterval(draw, 35);
        const overlay = document.createElement('div');
        overlay.style.cssText = `position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10000;color:${color};text-align:center;font-family:monospace;background:rgba(0,0,0,0.8);padding:30px;border:2px solid ${color};`;
        overlay.innerHTML = `<h2>📜 ОТКРОВЕНИЕ</h2><p>${color==='#FFD700'?'Святое число 42 введено. Истина открыта.':'Мир есть функция. Ввод определяет Вывод.'}</p><button onclick="location.reload()" style="background:none;border:1px solid ${color};color:${color};padding:10px;cursor:pointer;margin-top:15px;">ВЕРНУТЬСЯ</button>`;
        document.body.appendChild(overlay);
    };

    // 2. УТИЛИТЫ
    const isInsideBtn = (e, el) => {
        const rect = el.getBoundingClientRect();
        const touch = e.changedTouches ? e.changedTouches[0] : e;
        return (touch.clientX >= rect.left && touch.clientX <= rect.right && touch.clientY >= rect.top && touch.clientY <= rect.bottom);
    };

    const clearResult = () => { clearInterval(animInterval); finalPass = ""; disp.value = ""; disp.placeholder = "--------"; copy.disabled = true; };

    const updateIcons = () => {
        const v1 = s1.value.trim().toLowerCase(), v2 = s2.value.trim().toLowerCase(), v3 = num.value.trim(), L = parseInt(lenSel.value) || 0;
        const units = iconBox.querySelectorAll('.icon-unit');
        if (!v1 || !v2 || !v3) { units.forEach(u => { u.innerText = ""; u.style.opacity = "0.5"; }); return; }
        let h = 0x811c9dc5; const seed = v1 + _s + v2 + (parseInt(v3) * 179) + (L * 31);
        for (let i = 0; i < seed.length; i++) { h ^= seed.charCodeAt(i); h = Math.imul(h, 16777619); }
        const combo = [emojis[Math.abs(h)%50], emojis[Math.abs(Math.imul(h,31))%50], emojis[Math.abs(Math.imul(h,73))%50]];
        units.forEach((u, i) => { u.innerText = combo[i]; u.style.opacity = "1"; });
    };

    const applyMask = () => {
        const isHide = hide.checked;
        [s1, s2, num, disp].forEach(el => isHide ? el.classList.add('secure-mask') : el.classList.remove('secure-mask'));
        localStorage.setItem('gen_hideMode', isHide);
    };

    const updateUI = (fullReset = false) => {
        const isPin = pinMode.checked;
        if (fullReset) clearResult();
        document.body.classList.toggle('pin-mode-active', isPin);
        mainTitle.innerText = isPin ? "Генератор PIN-кодов" : "Генератор паролей";
        lenSel.innerHTML = isPin 
            ? '<option value="4" selected>4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option>'
            : '<option value="8">8</option><option value="12" selected>12</option><option value="16">16</option><option value="20">20</option><option value="24">24</option>';
        updateIcons(); applyMask();
        localStorage.setItem('gen_pinMode', isPin);
    };

    const resetAll = (isPanic = false) => {
        if (document.activeElement) document.activeElement.blur();
        [s1, s2, num].forEach(el => { el.value = ""; el.classList.remove('input-error'); });
        pinMode.checked = localStorage.getItem('gen_pinMode') === 'true';
        hide.checked = localStorage.getItem('gen_hideMode') === 'true';
        const savedTheme = localStorage.getItem('gen_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeToggle.innerText = savedTheme === 'dark' ? '☀️' : '🌙';
        updateUI(true);
        if(isPanic) { disp.placeholder = "ПАНИКА: ОЧИЩЕНО!"; setTimeout(() => { if(!finalPass) disp.placeholder = "--------"; }, 1000); }
        s1.focus();
    };

    // 3. ЛОГИКА ГЕНЕРАЦИИ (ENGINE)
    const generate = async () => {
        const v1 = s1.value.trim().toLowerCase(), v2 = s2.value.trim().toLowerCase(), v3 = num.value.trim();
        const n = parseInt(v3) || 0, L = parseInt(lenSel.value);
        
        // === ПАСХАЛКА ОРДЕНА ===
        if ((v1 === 'hash' && v2 === 'genesis') || (v1 === 'genesis' && v2 === 'hash')) {
            clearResult();
            startMatrix(n === 42 ? "#FFD700" : "#00FF00");
            return;
        }

        const seed = v1 + _s + v2 + (n * 179) + (L * 31);
        const msgUint8 = new TextEncoder().encode(seed);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        let tH = hashArray.slice(0, 4).reduce((acc, i) => (acc << 8) | i, 0);

        let res = [];
        if (pinMode.checked) {
            for (let i = 0; i < L; i++) {
                tH = Math.imul(tH ^ (hashArray[i % 32]), 0x85ebca6b);
                res.push("0123456789"[Math.abs(tH) % 10]);
            }
        } else {
            const U = "ABCDEFGHIJKLMNOPQRSTUVWXYZ", D = "0123456789", S = "!@#$%^*", M = "abcdefghijklmnopqrstuvwxyz";
            const alphaNum = U + D + M, all = U + D + S + M;
            res = [alphaNum[hashArray[0] % alphaNum.length], D[hashArray[1] % 10], S[hashArray[2] % 7]];
            for (let i = 3; i < L; i++) {
                tH = Math.imul(tH ^ hashArray[i % 32], 0x85ebca6b);
                res.push(all[Math.abs(tH) % all.length]);
            }
            for (let i = res.length - 1; i > 0; i--) {
                const j = Math.abs(Math.imul(tH, i)) % (i + 1);
                [res[i], res[j]] = [res[j], res[i]];
            }
        }

        finalPass = res.join('');
        clearInterval(animInterval);
        let it = 0;
        const chars = pinMode.checked ? "0123456789" : "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^*";
        animInterval = setInterval(() => {
            disp.value = finalPass.split("").map((c, i) => i < it ? finalPass[i] : chars[Math.floor(Math.random() * chars.length)]).join("");
            if (it >= finalPass.length) clearInterval(animInterval);
            it += 1/3;
        }, 30);
        copy.disabled = false;
    };

    const validate = async () => {
        let err = false;
        [s1, s2, num].forEach(f => { if(!f.value.trim()){ f.classList.add('input-error'); err=true; } else f.classList.remove('input-error'); });
        if(!err) await generate();
    };

    // 4. ОБРАБОТЧИКИ СОБЫТИЙ
    const handleGenStart = (e) => { if(!isInsideBtn(e, genBtn)) return; genBtn.classList.add('is-active'); };
    const handleGenEnd = (e) => { genBtn.classList.remove('is-active'); if(isInsideBtn(e, genBtn)) validate(); };
    genBtn.addEventListener('mousedown', handleGenStart);
    genBtn.addEventListener('mouseup', handleGenEnd);
    genBtn.addEventListener('touchstart', (e) => { if(e.cancelable) e.preventDefault(); handleGenStart(e); }, {passive: false});
    genBtn.addEventListener('touchend', (e) => { if(e.cancelable) e.preventDefault(); handleGenEnd(e); }, {passive: false});

    const handleResetStart = (e) => {
        if(!isInsideBtn(e, resetBtn)) return;
        resetBtn.classList.add('is-active'); if(e.cancelable) e.preventDefault();
        isLongPress = false;
        resetTimer = setTimeout(() => { isLongPress = true; localStorage.clear(); location.reload(); }, 2000);
    };
    const handleResetEnd = (e) => {
        clearTimeout(resetTimer); resetBtn.classList.remove('is-active');
        if(!isLongPress && isInsideBtn(e, resetBtn)) resetAll(false);
    };
    resetBtn.addEventListener('mousedown', handleResetStart);
    resetBtn.addEventListener('mouseup', handleResetEnd);
    resetBtn.addEventListener('touchstart', handleResetStart, {passive: false});
    resetBtn.addEventListener('touchend', handleResetEnd, {passive: false});

    const inputs = [s1, s2, num];
    inputs.forEach((el, idx) => {
        el.setAttribute('autocomplete', 'one-time-code');
        el.setAttribute('spellcheck', 'false');
        el.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (!el.value.trim()){ el.classList.add('input-error'); el.focus(); }
                else if (el.id === 'num'){ el.blur(); validate(); }
                else inputs[idx + 1].focus();
            }
        });
        el.addEventListener('input', () => { 
            el.classList.remove('input-error'); 
            if(el.id==='num') el.value=el.value.replace(/[^0-9]/g,'').slice(0,3); 
            updateIcons(); clearResult(); 
        });
        el.addEventListener('blur', () => { if(!el.value.trim()) el.classList.add('input-error'); else if(el.id==='num' && s1.value.trim() && s2.value.trim()) validate(); });
    });

    copy.onclick = () => {
        const t = document.createElement('textarea'); t.value = finalPass; document.body.appendChild(t);
        t.select(); document.execCommand('copy'); document.body.removeChild(t);
        const old = copy.innerText; copy.innerText = "ГОТОВО"; copy.classList.add('copied');
        setTimeout(() => { copy.innerText = old; copy.classList.remove('copied'); }, 1500);
    };

    const showP = (e) => { if(e.cancelable) e.preventDefault(); disp.classList.remove('secure-mask'); };
    const hideP = () => { if(hide.checked && finalPass) disp.classList.add('secure-mask'); };
    disp.addEventListener('mousedown', showP); disp.addEventListener('mouseup', hideP); disp.addEventListener('mouseleave', hideP);
    disp.addEventListener('touchstart', showP, {passive: false}); disp.addEventListener('touchend', hideP);

    themeToggle.onclick = () => {
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        themeToggle.innerText = next === 'dark' ? '☀️' : '🌙';
        localStorage.setItem('gen_theme', next);
    };

    pinMode.onchange = () => updateUI(true);
    lenSel.onchange = () => { clearResult(); updateIcons(); };
    hide.onchange = applyMask;

    ['mousedown', 'keydown', 'touchstart'].forEach(ev => document.addEventListener(ev, () => { 
        clearTimeout(panicTimer); panicTimer = setTimeout(() => resetAll(true), 60000); 
    }));
    
    window.onload = () => resetAll(false);
    })();

    document.getElementById('helpBtn').onclick = () => { window.open('readme.html', '_blank'); };
</script>
<canvas id="matrix-canvas"></canvas>
</body>
</html>
